<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="Description" content="Plainsound Hexatone"/>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <title>Plainsound Hexatone</title>
  <meta name="theme-color" content="#2973CC"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <link rel="apple-touch-icon" href="/192.png"/>

  <link rel="manifest" href="manifest.webmanifest"/>
</head>
<body>
  <div id="application"></div>
  <noscript>This application requires javascript.</noscript>

  <!-- Overflow debugger — logs elements wider than viewport to console -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const over = Array.from(document.querySelectorAll('*')).filter(el => {
          const r = el.getBoundingClientRect();
          return r.right > window.innerWidth + 1;
        });
        if (over.length) console.warn('[overflow] elements wider than viewport:', over.map(el => ({ tag: el.tagName, id: el.id, class: el.className, right: el.getBoundingClientRect().right, innerWidth: window.innerWidth })));
        else console.log('[overflow] no overflowing elements found');
      }, 1000);
    });
  </script>
  <!-- Vite's entry point — replaces HtmlWebpackPlugin injection -->
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
